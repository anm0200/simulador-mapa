name: CI - Verificaciones TFG

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # 1. Apartado de Estructura y Frontend (HTML/Typescript/Format)
  calidad_estructura:
    name: 'Calidad: Estructura y Formato'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Instalación Limpia
        run: npm ci
      - name: Verificar Formato (Prettier)
        run: npx prettier --check .

  # 2. Apartado de Diseño y Estilos (CSS)
  calidad_estilos:
    name: 'Calidad: Estilos y Diseño (CSS)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Instalación Limpia
        run: npm ci
      - name: Verificar Lint de CSS
        # Aquí podrías añadir stylelint en el futuro, por ahora usamos prettier para CSS también
        run: npx prettier --check "**/*.css"

  # 3. Apartado de Lógica y Mapas (Tests Unitarios)
  logica_funcionalidad:
    name: 'Lógica: Simulador y Mapas'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Instalación Limpia
        run: npm ci
      - name: Ejecutar Tests de Logica (Vitest)
        run: npx vitest run --globals --environment jsdom --setupFiles src/test-setup.ts

  # 4. Apartado de Compilación Final
  build_proyecto:
    name: 'Build: Compilación Global'
    runs-on: ubuntu-latest
    needs: [calidad_estructura, calidad_estilos, logica_funcionalidad]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Instalación Limpia
        run: npm ci
      - name: Compilar Proyecto Angular
        run: npm run build
